version: "3.9"

services:
  db:
    image: postgres:16
    container_name: hw12_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:543"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hw12_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: hw12_app
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "${PORT:-8001}:8000"
    volumes:
      - .:/code
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: